name: Branark Closing Ledger API Env Check

on:
  workflow_dispatch:
    inputs:
      memo:
        description: "수동 점검 메모"
        required: false
        default: "manual api env check"

permissions:
  contents: read

jobs:
  env-check:
    name: Check Google Drive / Sheets API env
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID || secrets.BRANARK_ORDER_UPLOAD_FOLDER_ID || vars.BRANARK_ORDER_UPLOAD_FOLDER_ID }}
      DAILY_SHEET_ID: ${{ secrets.DAILY_SHEET_ID || secrets.DAILY_SPREADSHEET_ID || secrets.BRANARK_CLOSING_LEDGER_SPREADSHEET_ID || vars.BRANARK_CLOSING_LEDGER_SPREADSHEET_ID }}
      PRICE_SHEET_ID: ${{ secrets.PRICE_SHEET_ID || secrets.PRICE_FILE_ID || secrets.BRANARK_PRICE_FILE_ID || vars.BRANARK_PRICE_FILE_ID }}
    steps:
      - name: Check required GitHub Actions secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          check_env() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::$name 값이 비어 있습니다. Repository secrets 설정을 확인하세요."
              missing=1
            else
              echo "::notice::$name 설정 확인 완료"
            fi
          }

          check_env GOOGLE_SERVICE_ACCOUNT_JSON
          check_env DRIVE_FOLDER_ID
          check_env DAILY_SHEET_ID
          check_env PRICE_SHEET_ID

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare Google credentials
        shell: bash
        run: |
          set -euo pipefail
          credentials_path="${RUNNER_TEMP}/google-service-account.json"
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > "$credentials_path"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$credentials_path" >> "$GITHUB_ENV"
          echo "::notice::Google credentials file prepared"

      - name: Install Google API client
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-api-python-client google-auth

      - name: Verify Google Drive and Sheets access
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          scopes = [
              "https://www.googleapis.com/auth/drive",
              "https://www.googleapis.com/auth/spreadsheets",
          ]

          credentials_path = os.environ["GOOGLE_APPLICATION_CREDENTIALS"]
          drive_folder_id = os.environ["DRIVE_FOLDER_ID"]
          daily_sheet_id = os.environ["DAILY_SHEET_ID"]
          price_sheet_id = os.environ["PRICE_SHEET_ID"]

          credentials = service_account.Credentials.from_service_account_file(
              credentials_path,
              scopes=scopes,
          )

          drive = build("drive", "v3", credentials=credentials)
          sheets = build("sheets", "v4", credentials=credentials)

          folder = drive.files().get(
              fileId=drive_folder_id,
              fields="id,name,mimeType",
              supportsAllDrives=True,
          ).execute()
          print(f"Drive upload folder OK: {folder['name']} ({folder['mimeType']})")

          price_file = drive.files().get(
              fileId=price_sheet_id,
              fields="id,name,mimeType",
              supportsAllDrives=True,
          ).execute()
          print(f"Price file OK: {price_file['name']} ({price_file['mimeType']})")

          daily_sheet = sheets.spreadsheets().get(
              spreadsheetId=daily_sheet_id,
              fields="spreadsheetId,properties.title,sheets.properties.title",
          ).execute()
          sheet_titles = [sheet["properties"]["title"] for sheet in daily_sheet.get("sheets", [])]
          print(f"Daily sheet OK: {daily_sheet['properties']['title']}")
          print(f"Daily sheet tabs: {', '.join(sheet_titles)}")
          PY

      - name: Print connection summary
        shell: bash
        run: |
          echo "브랜아크 일일마감 자동화 API env 연결 점검 완료"
          echo "- GOOGLE_SERVICE_ACCOUNT_JSON: configured"
          echo "- DRIVE_FOLDER_ID: configured"
          echo "- DAILY_SHEET_ID: configured"
          echo "- PRICE_SHEET_ID: configured"
